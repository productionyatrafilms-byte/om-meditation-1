<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title data-lang-key="title"></title>
  </head>
  <style>
    /* ─── PAGE 2 — hidden initially, scales up from bottom center on enter ─── */
    .page-2 {
      transform-origin: bottom center;
      transform: translateX(-50%) scale(0);
      opacity: 0;
      pointer-events: none;
      transition:
        transform 0.65s cubic-bezier(0.34, 1.3, 0.64, 1),
        opacity   0.4s ease;
    }

    .page-2.visible {
      transform: translateX(-50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    /* ─── PAGE 1 — hides after enter click ─── */
    .page-1 {
      transition: opacity 0.35s ease;
    }

    .page-1.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <body>
    <a class="home-button home-btn" href="index.html">
      <img src="./assets/images/home.png" alt="" />
    </a>

    <div class="page-title">
      <img src="./assets/images/t-1.png" alt="" />
      <span data-lang-key="title"></span>
      <img src="./assets/images/t-2.png" alt="" />
    </div>

    <!-- nav-container -->
    <div class="language-container">
      <div class="english active">E</div>
      <div class="hindi">H</div>
      <div class="gujrati">G</div>
    </div>

    <div class="page-1">
      <button class="enter-btn" data-lang-key="enter"></button>
      <div class="mascot">
        <img src="./assets/images/mascot.png" alt="" />
      </div>
      <img class="arc arc-1"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-2"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-3"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-4"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-5"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-6"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-7"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-8"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-9"  src="./assets/images/ark.png" alt="" />
      <img class="arc arc-10" src="./assets/images/ark.png" alt="" />
      <img class="arc arc-11" src="./assets/images/ark.png" alt="" />
    </div>

    <div class="page-2">
      <img class="t-container" src="./assets/images/t-container.png" alt="" />

      <a class="topic topic-1" href="topic-1.html">
        <div class="topic-inner">
          <img src="./assets/images/t-img.png" alt="" />
          <span class="num"  data-lang-key="num.1"></span>
          <span class="text" data-lang-key="title-1"></span>
        </div>
      </a>

      <a class="topic topic-2" href="topic-2.html">
        <div class="topic-inner">
          <img src="./assets/images/t-img.png" alt="" />
          <span class="num"  data-lang-key="num.2"></span>
          <span class="text" data-lang-key="title-2"></span>
        </div>
      </a>

      <a class="topic topic-3" href="topic-3.html">
        <div class="topic-inner">
          <img src="./assets/images/t-img.png" alt="" />
          <span class="num"  data-lang-key="num.3"></span>
          <span class="text" data-lang-key="title-3"></span>
        </div>
      </a>

      <a class="topic topic-4" href="topic-4.html">
        <div class="topic-inner">
          <img src="./assets/images/t-img.png" alt="" />
          <span class="num"  data-lang-key="num.4"></span>
          <span class="text" data-lang-key="title-4"></span>
        </div>
      </a>

      <a class="topic topic-5" href="topic-5.html">
        <div class="topic-inner">
          <img src="./assets/images/t-img.png" alt="" />
          <span class="num"  data-lang-key="num.5"></span>
          <span class="text" data-lang-key="title-5"></span>
        </div>
      </a>
    </div>

    <script src="./assets/js/app.js"></script>

    <script>
      window.addEventListener("load", () => {
        const page1     = document.querySelector(".page-1");
        const page2     = document.querySelector(".page-2");
        const pageTitle = document.querySelector(".page-title");
        const enterBtn  = document.querySelector(".enter-btn");
        const homeBtn   = document.querySelector(".home-button");
        const langBox   = document.querySelector(".language-container");
        const mascot    = document.querySelector(".mascot");

        // Step 1 — arcs fan out + mascot rises
        setTimeout(() => {
          page1.classList.add("arcs-ready");
          mascot.classList.add("lifted");
        }, 300);

        // Step 2 — page title fades in
        setTimeout(() => {
          pageTitle.classList.add("visible");
        }, 450);

        // Step 3 — enter button slides up
        setTimeout(() => {
          enterBtn.classList.add("visible");
        }, 950);

        // On Enter click — hide page-1, reveal page-2 + nav elements
        enterBtn.addEventListener("click", () => {
          // fade out page-1
          page1.classList.add("hidden");

          // slight delay so page-1 starts fading before page-2 pops in
          setTimeout(() => {
            page2.classList.add("visible");
          }, 150);

          // reveal home-btn & language switcher
          homeBtn.classList.add("revealed");
          langBox.classList.add("revealed");
        });
      });
    </script>
  </body>
</html>
